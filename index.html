<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動式聽音指圖遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f9ff;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            touch-action: manipulation;
        }
        .mirror {
            transform: scaleX(-1);
        }
        /* 響應式目標框 */
        .target-box {
            transition: all 0.2s ease;
            border: 4px solid transparent;
            position: absolute;
            width: 22%; 
            min-width: 80px;
            max-width: 180px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 15%;
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        @media (min-width: 768px) {
            .target-box {
                border-width: 6px;
                width: 25%;
            }
        }

        .target-box.success {
            border-color: #34d399;
            background-color: rgba(52, 211, 153, 0.4);
            transform: scale(1.15);
            z-index: 30;
        }
        
        .target-box.wrong {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.2);
            animation: shake 0.4s ease-in-out;
            z-index: 30;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: #000;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
        .animal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-2 md:p-4">

    <div class="text-center mb-4 md:mb-6 mt-2">
        <h1 class="text-3xl md:text-4xl font-bold text-blue-600 mb-1">Listen and Point!</h1>
        <p class="text-gray-600 text-sm md:text-lg">聽聽單字，指向正確的圖片</p>
    </div>

    <div id="video-container" class="aspect-video flex items-center justify-center">
        <video id="input_video" class="mirror" style="display:none" playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        
        <!-- 遊戲區域 UI -->
        <div id="game-ui" class="hidden contents">
            <div id="target-0" class="target-box top-2 left-2 md:top-4 md:left-4 z-10">
                <img src="https://i.ibb.co/sv1J8yrt/chiemsee2024-cat-1192026-640.jpg" alt="Cat" class="animal-img">
            </div>
            <div id="target-1" class="target-box top-2 right-2 md:top-4 md:right-4 z-10">
                <img src="https://i.ibb.co/GvS5ZZFv/pexels-turtle-1850190-640.jpg" alt="Turtle" class="animal-img">
            </div>
            <div id="target-2" class="target-box bottom-2 left-2 md:bottom-4 md:left-4 z-10">
                <img src="https://i.ibb.co/5XJQMrtt/balouriarajesh-indian-chat-7704561-640.jpg" alt="Bird" class="animal-img">
            </div>
            <div id="target-3" class="target-box bottom-2 right-2 md:bottom-4 md:right-4 z-10">
                <img src="https://i.ibb.co/mFrK8p4M/vijakob-rabbits-5132644-640.jpg" alt="Rabbit" class="animal-img">
            </div>
        </div>

        <!-- 啟動面板 -->
        <div id="init-panel" class="absolute inset-0 bg-white bg-opacity-95 flex flex-col items-center justify-center z-40 p-4 text-center">
            <div id="start-view">
                <div class="mb-4 text-blue-500">
                    <svg class="w-16 h-16 md:w-20 md:h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-xl md:text-2xl font-bold mb-2">準備開始互動教學</h2>
                <p class="text-gray-600 text-sm md:text-base mb-6">請點擊下方按鈕啟動攝影機。<br>建議將手機橫放使用，效果更佳！</p>
                <button id="btn-start-camera" class="bg-blue-600 hover:bg-blue-700 text-white text-lg md:text-xl font-bold py-3 px-8 md:py-4 md:px-12 rounded-full shadow-xl transition transform active:scale-95">
                    立即啟動
                </button>
            </div>
            
            <div id="error-view" class="hidden p-4">
                <div class="text-red-500 text-5xl mb-2">⚠️</div>
                <h2 id="error-title" class="text-lg font-bold text-gray-800 mb-1">攝影機啟動失敗</h2>
                <div id="error-desc" class="text-gray-700 text-xs md:text-sm mb-4"></div>
                <button onclick="location.reload()" class="bg-gray-800 text-white py-2 px-6 rounded-full">重試一次</button>
            </div>
        </div>
    </div>

    <!-- 按鈕區域 -->
    <div class="mt-4 md:mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6 w-full max-w-4xl px-2">
        <button onclick="playRound(0)" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 md:py-6 rounded-2xl shadow-lg transition transform active:scale-95 text-xl md:text-3xl">Cat</button>
        <button onclick="playRound(1)" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 md:py-6 rounded-2xl shadow-lg transition transform active:scale-95 text-xl md:text-3xl">Turtle</button>
        <button onclick="playRound(2)" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 md:py-6 rounded-2xl shadow-lg transition transform active:scale-95 text-xl md:text-3xl">Bird</button>
        <button onclick="playRound(3)" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 md:py-6 rounded-2xl shadow-lg transition transform active:scale-95 text-xl md:text-3xl">Rabbit</button>
    </div>

    <div id="status-msg" class="mt-4 text-base md:text-xl text-blue-700 font-semibold h-6 text-center">
        請啟動攝影機
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusMsg = document.getElementById('status-msg');
        const initPanel = document.getElementById('init-panel');
        const startView = document.getElementById('start-view');
        const errorView = document.getElementById('error-view');
        const btnStart = document.getElementById('btn-start-camera');
        const gameUI = document.getElementById('game-ui');

        const audioCorrect = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/correct.mp3');
        const audioError = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/error.mp3');
        audioCorrect.volume = 1.0;
        audioError.volume = 1.0;

        let currentTargetId = -1;
        let isSuccess = false;
        let canScore = false;
        let isCameraActive = false;
        let errorCooldown = false; 

        const animals = [
            { id: 0, name: 'Cat', audioUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-1-cat.mp3' },
            { id: 1, name: 'Turtle', audioUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-4-turtle.mp3' },
            { id: 2, name: 'Bird', audioUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-2-bird.mp3' },
            { id: 3, name: 'Rabbit', audioUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-3-rabbit.mp3' }
        ];

        // 手機版解鎖音訊功能
        function unlockAudio() {
            audioCorrect.play().then(() => {
                audioCorrect.pause();
                audioCorrect.currentTime = 0;
            }).catch(() => {});
            
            audioError.play().then(() => {
                audioError.pause();
                audioError.currentTime = 0;
            }).catch(() => {});
        }

        function playWordAudio(url) {
            const audio = new Audio(url);
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Audio failed", e));
        }

        function playRound(btnIndex) {
            if (!isCameraActive) return;
            resetBoxes();
            currentTargetId = btnIndex;
            canScore = true;
            isSuccess = false;
            statusMsg.innerText = `Listen: ${animals[currentTargetId].name}`;
            playWordAudio(animals[currentTargetId].audioUrl);
        }

        function resetBoxes() {
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`target-${i}`);
                if (el) el.classList.remove('success', 'wrong');
            }
        }

        function onResults(results) {
            if (!isCameraActive) return;
            const container = document.getElementById('video-container');
            
            // 同步畫布尺寸
            const cWidth = container.clientWidth;
            const cHeight = container.clientHeight;
            canvasElement.width = cWidth;
            canvasElement.height = cHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, cWidth, cHeight);
            
            // 解決變形問題：使用裁切填滿 (Cover) 邏輯繪製視訊
            const vWidth = results.image.width;
            const vHeight = results.image.height;
            const scale = Math.max(cWidth / vWidth, cHeight / vHeight);
            const drawWidth = vWidth * scale;
            const drawHeight = vHeight * scale;
            const offsetLeft = (cWidth - drawWidth) / 2;
            const offsetTop = (cHeight - drawHeight) / 2;

            // 鏡像與繪製
            canvasCtx.translate(cWidth, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, offsetLeft, offsetTop, drawWidth, drawHeight);
            canvasCtx.restore();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    const indexFingerTip = landmarks[8];
                    const x = (1 - indexFingerTip.x) * cWidth;
                    const y = indexFingerTip.y * cHeight;

                    // 繪製手指追蹤點
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 12, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = isSuccess ? '#34d399' : '#fbbf24';
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = 'white';
                    canvasCtx.lineWidth = 3;
                    canvasCtx.stroke();

                    if (canScore && currentTargetId !== -1) {
                        checkCollision(x, y);
                    }
                }
            }
        }

        function checkCollision(x, y) {
            const container = document.getElementById('video-container');
            const rect = container.getBoundingClientRect();
            
            for (let i = 0; i < 4; i++) {
                const targetEl = document.getElementById(`target-${i}`);
                if (!targetEl) continue;
                
                const targetRect = targetEl.getBoundingClientRect();
                const relativeTop = targetRect.top - rect.top;
                const relativeLeft = targetRect.left - rect.left;
                const relativeBottom = targetRect.bottom - rect.top;
                const relativeRight = targetRect.right - rect.left;

                if (x >= relativeLeft && x <= relativeRight && y >= relativeTop && y <= relativeBottom) {
                    if (i === currentTargetId && !isSuccess) {
                        triggerSuccess();
                    } else if (i !== currentTargetId && !isSuccess && !errorCooldown) {
                        triggerError(i);
                    }
                    return;
                }
            }
        }

        function triggerSuccess() {
            isSuccess = true;
            canScore = false;
            const targetEl = document.getElementById(`target-${currentTargetId}`);
            targetEl.classList.add('success');
            statusMsg.innerText = "Great Job!";
            
            // 播放正確音效
            audioCorrect.currentTime = 0;
            audioCorrect.play().catch(e => console.error("Correct sound blocked:", e));
            
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

            setTimeout(() => {
                if (isSuccess) {
                    resetBoxes();
                    currentTargetId = -1;
                    statusMsg.innerText = "Next one?";
                    isSuccess = false;
                }
            }, 2000);
        }

        function triggerError(hitId) {
            errorCooldown = true;
            const wrongEl = document.getElementById(`target-${hitId}`);
            wrongEl.classList.add('wrong');
            statusMsg.innerText = "Try again!";
            
            // 播放錯誤音效
            audioError.currentTime = 0;
            audioError.play().catch(e => console.error("Error sound blocked:", e));

            setTimeout(() => {
                wrongEl.classList.remove('wrong');
                errorCooldown = false;
            }, 500);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        async function startCamera() {
            btnStart.disabled = true;
            btnStart.innerText = "啟動中...";
            
            // 解鎖手機版音訊
            unlockAudio();
            
            try {
                const constraints = { 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    isCameraActive = true;
                    initPanel.style.display = 'none';
                    gameUI.classList.remove('hidden');
                    statusMsg.innerText = "Ready! Click a button.";
                    
                    const processFrame = async () => {
                        if (isCameraActive) {
                            await hands.send({ image: videoElement });
                            requestAnimationFrame(processFrame);
                        }
                    };
                    processFrame();
                };
            } catch (err) {
                console.error(err);
                startView.classList.add('hidden');
                errorView.classList.remove('hidden');
                document.getElementById('error-desc').innerText = "請確認已開啟攝影機權限並重新整理。";
            }
        }

        btnStart.addEventListener('click', startCamera);

        window.addEventListener('resize', () => {
            const container = document.getElementById('video-container');
            if (container && canvasElement) {
                canvasElement.width = container.clientWidth;
                canvasElement.height = container.clientHeight;
            }
        });
    </script>
</body>
</html>
