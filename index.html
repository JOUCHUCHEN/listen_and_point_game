<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listen and Point - Interactive Learning Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap');

        /* 外層背景 */
        body {
            background-color: #cbd5e1;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            color: #4a3728;
        }

        .mirror {
            transform: scaleX(-1);
        }

        /* 16:9 遊戲容器 */
        .app-wrapper {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: #f8fafc;
            position: relative;
            overflow: hidden;
            container-type: size;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3.5cqh;
        }

        /* 目標框基礎樣式 */
        .target-box {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s, border-color 0.3s, background-color 0.3s;
            border: 0.6cqw solid #bae6fd; 
            position: absolute;
            z-index: 20;
            width: 20%; 
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 0.5cqw 1.5cqw rgba(0,0,0,0.05);
        }

        /* 通用答對動畫：發光效果 */
        .target-box.success {
            border-color: #4ade80 !important;
            background-color: white;
            transform: scale(1.25) rotate(15deg);
            z-index: 30;
            animation: bounce 0.5s ease infinite alternate;
            filter: drop-shadow(0 0 3cqw #4ade80);
        }
        
        @keyframes bounce {
            from { transform: scale(1.15) rotate(12deg); }
            to { transform: scale(1.3) rotate(-12deg); }
        }

        /* 通用答錯動畫：發光效果 */
        .target-box.wrong {
            border-color: #f87171 !important;
            background-color: white;
            animation: shake 0.4s ease-in-out;
            z-index: 30;
            filter: drop-shadow(0 0 3cqw #f87171);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        /* Level 2 模式：平常透明無邊框。覆寫 transition 以防止切換時圓框閃爍 */
        .target-box.level-2-mode {
            border-color: transparent !important;
            background-color: transparent !important;
            box-shadow: none;
            overflow: visible;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
        }

        /* 當在 Level 2 答對或答錯時，僅保留發光特效與動畫，不恢復白色圓框 */
        .target-box.level-2-mode.success, 
        .target-box.level-2-mode.wrong {
            background-color: transparent !important;
            border-color: transparent !important;
            box-shadow: none;
        }

        /* 個別設定動物在 Level 2 的大小 */
        #target-0.level-2-mode { width: 28%; } /* 貓咪 */
        #target-1.level-2-mode { width: 25%; } /* 烏龜 (25%) */
        #target-2.level-2-mode { width: 32%; } /* 小鳥 (32%) */
        #target-3.level-2-mode { width: 30%; } /* 兔子 (30%) */

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .animal-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5%;
            transition: transform 0.1s linear; 
        }

        .cloud {
            position: absolute;
            z-index: 0;
            animation: float 25s linear infinite;
        }
        @keyframes float {
            from { transform: translateX(-20cqw); }
            to { transform: translateX(120cqw); }
        }

        .candy-btn {
            border-bottom: 0.5cqh solid rgba(0,0,0,0.15);
            transition: all 0.1s;
            color: white;
            font-weight: 900;
        }
        .candy-btn:active {
            border-bottom-width: 0px;
            transform: translateY(0.5cqh) scale(0.95);
        }

        #landscape-hint {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #bae6fd;
            color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 9999;
        }
        @media screen and (orientation: portrait) {
            #landscape-hint { display: flex; align-items: center; gap: 8px; }
        }

        .title-sticker {
            color: #4a3728;
            -webkit-text-stroke: 0.25cqw #4a3728;
            text-shadow: 
                0.4cqw 0 0 #ffffff, -0.4cqw 0 0 #ffffff, 
                0 0.4cqw 0 #ffffff, 0 -0.4cqw 0 #ffffff,
                0.3cqw 0.3cqw 0 #ffffff, -0.3cqw -0.3cqw 0 #ffffff, 
                0.3cqw -0.3cqw 0 #ffffff, -0.3cqw 0.3cqw 0 #ffffff;
        }

        /* 首頁動物跳動動畫 */
        @keyframes animal-jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4cqh); }
        }
        .jumping-animal {
            display: block;
            animation: animal-jump 1s infinite ease-in-out;
            width: 22cqh;
            height: 22cqh;
            object-fit: contain;
        }
        .jumping-animal:nth-child(1) { animation-delay: 0s; }
        .jumping-animal:nth-child(2) { animation-delay: 0.15s; }
        .jumping-animal:nth-child(3) { animation-delay: 0.3s; }
        .jumping-animal:nth-child(4) { animation-delay: 0.45s; }
    </style>
</head>
<body>

    <div id="landscape-hint">
        <span>💫 Switch to Landscape for a better view!</span>
    </div>

    <div class="app-wrapper">
        
        <!-- 關卡切換按鈕 -->
        <button id="btn-level" onclick="toggleLevel()" class="hidden absolute z-50 candy-btn bg-[#8b5cf6] hover:bg-[#7c3aed] text-white rounded-full shadow-lg" style="top: 2cqh; right: 2cqw; padding: 1cqh 2.5cqw; font-size: 2.2cqh; width: auto; min-width: 12cqh;">
            Level 2 🪁
        </button>

        <!-- 音樂按鈕 -->
        <button id="btn-bgm" onclick="toggleBGM()" class="hidden flex absolute z-50 candy-btn bg-[#34d399] hover:bg-[#10b981] text-white rounded-full shadow-lg items-center justify-center" style="top: 2cqh; left: 2cqw; width: 6cqh; height: 6cqh; font-size: 3cqh;">
            🎵
        </button>

        <svg class="cloud" style="top: 10cqh; opacity: 0.6; width: 15cqw;" viewBox="0 0 100 60"><path fill="#e0f2fe" d="M20,40 Q0,40 0,25 Q0,10 20,10 Q25,0 45,0 Q65,0 70,15 Q95,15 95,35 Q95,55 70,55 L20,55 Z"/></svg>
        <svg class="cloud" style="top: 60cqh; animation-delay: -12s; opacity: 0.8; width: 25cqw;" viewBox="0 0 100 60"><path fill="#e0f2fe" d="M20,40 Q0,40 0,25 Q0,10 20,10 Q25,0 45,0 Q65,0 70,15 Q95,15 95,35 Q95,55 70,55 L20,55 Z"/></svg>
        
        <h1 id="main-title" class="font-black tracking-wide z-10 flex-shrink-0 title-sticker" style="font-size: 13cqh; margin: 0; line-height: 1; transform: translateY(-1cqh);">Listen and Point</h1>

        <div id="video-container" class="relative w-[70cqw] aspect-video bg-[#334155] overflow-hidden flex-shrink-0 z-10" style="border-radius: 3cqw; border: 0.8cqw solid #bae6fd; box-shadow: 0 1.5cqw 3cqw rgba(0,0,0,0.05);">
            <video id="input_video" class="mirror" style="display:none" playsinline muted autoplay></video>
            <canvas id="output_canvas"></canvas>
            
            <div id="game-ui" class="hidden absolute inset-0 pointer-events-none">
                <div id="target-0" class="target-box" style="top: 4cqh; left: 4cqh;"><img src="img/cat.png" class="animal-img"></div>
                <div id="target-1" class="target-box" style="top: 4cqh; right: 4cqh;"><img src="img/turtle.png" class="animal-img"></div>
                <div id="target-2" class="target-box" style="bottom: 4cqh; left: 4cqh;"><img src="img/bird.png" class="animal-img"></div>
                <div id="target-3" class="target-box" style="bottom: 4cqh; right: 4cqh;"><img src="img/rabbit.png" class="animal-img"></div>
            </div>

            <div id="init-panel" class="absolute inset-0 bg-[#f8fafc] flex flex-col items-center justify-center z-40">
                <div class="mt-[4cqh] mb-[2cqh] flex gap-[2cqw]">
                    <img src="img/cat-nobg.png" class="jumping-animal">
                    <img src="img/bird-nobg.png" class="jumping-animal">
                    <img src="img/rabbit-nobg.png" class="jumping-animal">
                    <img src="img/turtle-nobg.png" class="jumping-animal">
                </div>
                <h2 class="font-black mb-[4cqh] tracking-wide" style="color: #0369a1; font-size: 11cqh; -webkit-text-stroke: 0.15cqw #0369a1;">Ready?</h2>
                <button id="btn-start-camera" class="bg-[#f09f3b] hover:bg-[#df8a28] text-white font-black rounded-full transition transform active:scale-95" style="font-size: 5.5cqh; padding: 2.5cqh 12cqw; box-shadow: 0 1cqh 3cqh rgba(240, 159, 59, 0.4);">GO !</button>
            </div>
            
            <div id="error-view" class="hidden absolute inset-0 bg-[#f8fafc] flex flex-col items-center justify-center z-40 px-[4cqw] text-center">
                <div class="text-red-400 mb-[2cqh]" style="font-size: 8cqh;">😿</div>
                <h2 class="font-bold text-gray-800 mb-[1cqh]" style="font-size: 4cqh;">Camera Problem...</h2>
                <p id="error-desc" class="text-gray-500 mb-[3cqh]" style="font-size: 2.5cqh;"></p>
                <button onclick="location.reload()" class="bg-[#bae6fd] text-[#1e3a8a] rounded-full font-bold shadow-sm" style="font-size: 3cqh; padding: 2cqh 5cqw;">Try Again</button>
            </div>
        </div>

        <div id="button-container" class="w-[70cqw] grid-cols-4 gap-[2cqw] flex-shrink-0 z-10" style="display: none;">
            <button onclick="playRound(0)" class="candy-btn bg-[#fb7185] hover:bg-[#f43f5e] rounded-[1.5cqw]" style="font-size: 3.5cqh; padding: 1.8cqh 0;">cat</button>
            <button onclick="playRound(1)" class="candy-btn bg-[#34d399] hover:bg-[#10b981] rounded-[1.5cqw]" style="font-size: 3.5cqh; padding: 1.8cqh 0;">turtle</button>
            <button onclick="playRound(2)" class="candy-btn bg-[#fbbf24] hover:bg-[#f59e0b] rounded-[1.5cqw]" style="font-size: 3.5cqh; padding: 1.8cqh 0;">bird</button>
            <button onclick="playRound(3)" class="candy-btn bg-[#818cf8] hover:bg-[#6366f1] rounded-[1.5cqw]" style="font-size: 3.5cqh; padding: 1.8cqh 0;">rabbit</button>
        </div>

        <div id="status-msg" class="absolute font-bold text-center pointer-events-none z-20 w-full" style="color: #4a3728; font-size: 3.5cqh; top: 12cqh;"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const initPanel = document.getElementById('init-panel');
        const errorView = document.getElementById('error-view');
        const btnStart = document.getElementById('btn-start-camera');
        const gameUI = document.getElementById('game-ui');

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        const audioBufferCache = {}; 

        const bgmAudio = new Audio('sound/bgm.mp3');
        bgmAudio.loop = true;

        const BGM_VOL = 0.2;    
        const WORD_BOOST = 2.5;     
        const FEEDBACK_BOOST = 2.0; 

        const feedbackSounds = {
            correctFX: 'sound/correct.mp3',
            errorFX: 'sound/error.mp3',
            tryAgain: 'sound/try again.mp3',
            great: 'sound/great.mp3',
            goodJob: 'sound/good job.mp3',
            wayToGo: 'sound/way to go.mp3'
        };
        
        const animals = [
            { id: 0, src: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-1-cat.mp3' },
            { id: 1, src: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-4-turtle.mp3' },
            { id: 2, src: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-2-bird.mp3' },
            { id: 3, src: 'https://raw.githubusercontent.com/JOUCHUCHEN/listen_and_point/main/30-3-rabbit.mp3' }
        ];

        function applyInitialVolumes() {
            bgmAudio.volume = BGM_VOL;
        }
        applyInitialVolumes();

        let currentTargetId = -1;
        let isSuccess = false;
        let canScore = false;
        let isCameraActive = false;
        let errorCooldown = false; 
        let isBgmPlaying = true;
        let isLevel2 = false;

        async function preLoadAllAudios() {
            if (!audioCtx) audioCtx = new AudioCtx();
            const allSources = [...animals.map(a => a.src), ...Object.values(feedbackSounds)];
            const loadPromises = allSources.map(async (src) => {
                if (audioBufferCache[src]) return;
                try {
                    const response = await fetch(src);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    audioBufferCache[src] = audioBuffer;
                } catch (e) {
                    console.error("Failed to preload audio:", src, e);
                }
            });
            await Promise.all(loadPromises);
        }

        function playBoostedAudio(url, boostLevel) {
            if (!audioCtx) audioCtx = new AudioCtx();
            const buffer = audioBufferCache[url];
            if (buffer) {
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = boostLevel;
                gainNode.connect(audioCtx.destination);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(gainNode);
                source.start(0);
            } else {
                const fallback = new Audio(url);
                fallback.volume = Math.min(boostLevel, 1.0);
                fallback.play();
            }
        }

        function toggleBGM() {
            const btn = document.getElementById('btn-bgm');
            if (isBgmPlaying) {
                bgmAudio.pause();
                isBgmPlaying = false;
                btn.innerHTML = '🔇';
                btn.classList.replace('bg-[#34d399]', 'bg-[#9ca3af]');
            } else {
                bgmAudio.play().catch(() => {});
                isBgmPlaying = true;
                btn.innerHTML = '🎵';
                btn.classList.replace('bg-[#9ca3af]', 'bg-[#34d399]');
            }
        }

        const animalsPos = [
            { id: 'target-0', el: null, dirX: 1, dirY: 1 },
            { id: 'target-1', el: null, dirX: -1.2, dirY: 0.9 },
            { id: 'target-2', el: null, dirX: 0.8, dirY: -1.1 },
            { id: 'target-3', el: null, dirX: -1, dirY: -1 }
        ];

        function toggleLevel() {
            isLevel2 = !isLevel2;
            const btn = document.getElementById('btn-level');
            const container = document.getElementById('video-container');
            if (isLevel2) {
                btn.innerHTML = 'Level 1 🏠';
                btn.classList.replace('bg-[#8b5cf6]', 'bg-[#3b82f6]');
                document.querySelector('#target-0 .animal-img').src = 'img/cat-walk.gif';
                document.querySelector('#target-1 .animal-img').src = 'img/turtle-2.png'; 
                document.querySelector('#target-2 .animal-img').src = 'img/bird-fly.gif';
                document.querySelector('#target-3 .animal-img').src = 'img/rabbit-run.gif';
                const rect = container.getBoundingClientRect();
                animalsPos.forEach(anim => {
                    if (!anim.el) anim.el = document.getElementById(anim.id);
                    // 先切換類別以立即套用無動畫的透明樣式
                    anim.el.classList.add('level-2-mode');
                    const elRect = anim.el.getBoundingClientRect();
                    anim.x = elRect.left - rect.left;
                    anim.y = elRect.top - rect.top;
                    // 設定高度隨機的方向與速度 (0.6 ~ 1.8 倍速)
                    anim.dirX = (Math.random() > 0.5 ? 1 : -1) * (0.6 + Math.random() * 1.2);
                    anim.dirY = (Math.random() > 0.5 ? 1 : -1) * (0.6 + Math.random() * 1.2);
                });
            } else {
                btn.innerHTML = 'Level 2 🪁';
                btn.classList.replace('bg-[#3b82f6]', 'bg-[#8b5cf6]');
                document.querySelector('#target-0 .animal-img').src = 'img/cat.png';
                document.querySelector('#target-1 .animal-img').src = 'img/turtle.png';
                document.querySelector('#target-2 .animal-img').src = 'img/bird.png';
                document.querySelector('#target-3 .animal-img').src = 'img/rabbit.png';
                const defaultStyles = [{top:'4cqh',left:'4cqh'}, {top:'4cqh',right:'4cqh'}, {bottom:'4cqh',left:'4cqh'}, {bottom:'4cqh',right:'4cqh'}];
                animalsPos.forEach((anim, i) => {
                    anim.el.classList.remove('level-2-mode');
                    anim.x = anim.y = undefined;
                    Object.assign(anim.el.style, { top: '', left: '', right: '', bottom: '' });
                    for(let key in defaultStyles[i]) anim.el.style[key] = defaultStyles[i][key];
                    const img = anim.el.querySelector('.animal-img');
                    if (img) img.style.transform = '';
                });
            }
        }

        function moveAnimalsLoop() {
            if (isLevel2 && isCameraActive) {
                const container = document.getElementById('video-container');
                const cw = container.clientWidth, ch = container.clientHeight;
                const speedBase = cw * 0.0035;
                animalsPos.forEach(anim => {
                    if (!anim.el || anim.x === undefined) return;
                    anim.x += anim.dirX * speedBase;
                    anim.y += anim.dirY * speedBase;
                    const bw = anim.el.clientWidth, bh = anim.el.clientHeight;
                    if (anim.x <= 0) { anim.x = 0; anim.dirX *= -1; }
                    if (anim.x + bw >= cw) { anim.x = cw - bw; anim.dirX *= -1; }
                    if (anim.y <= 0) { anim.y = 0; anim.dirY *= -1; }
                    if (anim.y + bh >= ch) { anim.y = ch - bh; anim.dirY *= -1; }
                    const img = anim.el.querySelector('.animal-img');
                    if (img) {
                        if (anim.id === 'target-0' || anim.id === 'target-1' || anim.id === 'target-2') {
                            img.style.transform = anim.dirX > 0 ? 'scaleX(-1)' : 'scaleX(1)';
                        } else if (anim.id === 'target-3') {
                            img.style.transform = anim.dirX < 0 ? 'scaleX(-1)' : 'scaleX(1)';
                        }
                    }
                });
                animalsPos.forEach(anim => {
                    if (!anim.el || anim.x === undefined) return;
                    Object.assign(anim.el.style, { left: anim.x + 'px', top: anim.y + 'px', right: 'auto', bottom: 'auto' });
                });
            }
            requestAnimationFrame(moveAnimalsLoop);
        }

        function unlockAudio() {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const silent = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
                silent.play();
                bgmAudio.load();
            } catch (e) {}
        }

        function playRound(btnIndex) {
            if (!isCameraActive) return;
            resetBoxes();
            currentTargetId = btnIndex;
            canScore = true;
            isSuccess = false;
            playBoostedAudio(animals[currentTargetId].src, WORD_BOOST);
        }

        function resetBoxes() {
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`target-${i}`);
                if (el) el.classList.remove('success', 'wrong');
            }
        }

        function onResults(results) {
            if (!isCameraActive) return;
            const container = document.getElementById('video-container');
            const cw = container.clientWidth, ch = container.clientHeight;
            canvasElement.width = cw; canvasElement.height = ch;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, cw, ch);
            canvasCtx.translate(cw, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, cw, ch);
            canvasCtx.restore();
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    const tip = landmarks[8];
                    const x = (1 - tip.x) * cw, y = tip.y * ch;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, cw * 0.025, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = isSuccess ? '#4ade80' : '#fbbf24';
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = 'white';
                    canvasCtx.lineWidth = cw * 0.006;
                    canvasCtx.stroke();
                    if (canScore && currentTargetId !== -1) checkCollision(x, y);
                }
            }
        }

        function checkCollision(x, y) {
            const container = document.getElementById('video-container');
            const rect = container.getBoundingClientRect();
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`target-${i}`);
                if (!el) continue;
                const r = el.getBoundingClientRect();
                const cx = (r.left - rect.left) + r.width / 2;
                const cy = (r.top - rect.top) + r.height / 2;
                const dist = Math.sqrt(Math.pow(x - cx, 2) + Math.pow(y - cy, 2));
                if (dist <= r.width * 0.4) {
                    if (i === currentTargetId && !isSuccess) triggerSuccess();
                    else if (i !== currentTargetId && !isSuccess && !errorCooldown) triggerError(i);
                    return;
                }
            }
        }

        function triggerSuccess() {
            isSuccess = true; canScore = false;
            document.getElementById(`target-${currentTargetId}`).classList.add('success');
            playBoostedAudio(feedbackSounds.correctFX, FEEDBACK_BOOST);
            setTimeout(() => {
                const successVoices = [feedbackSounds.great, feedbackSounds.goodJob, feedbackSounds.wayToGo];
                const voice = successVoices[Math.floor(Math.random() * successVoices.length)];
                playBoostedAudio(voice, FEEDBACK_BOOST);
            }, 100);
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 } });
            setTimeout(() => { if (isSuccess) { resetBoxes(); currentTargetId = -1; isSuccess = false; } }, 2000);
        }

        function triggerError(hitId) {
            errorCooldown = true;
            document.getElementById(`target-${hitId}`).classList.add('wrong');
            playBoostedAudio(feedbackSounds.errorFX, FEEDBACK_BOOST);
            setTimeout(() => { playBoostedAudio(feedbackSounds.tryAgain, FEEDBACK_BOOST); }, 100);
            setTimeout(() => { document.getElementById(`target-${hitId}`).classList.remove('wrong'); errorCooldown = false; }, 500);
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        async function startCamera() {
            btnStart.disabled = true; unlockAudio();
            await preLoadAllAudios();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 720 } });
                videoElement.srcObject = stream;
                await videoElement.play();
                isCameraActive = true;
                initPanel.style.display = 'none';
                gameUI.classList.remove('hidden');
                document.getElementById('main-title').style.display = 'none';
                document.getElementById('button-container').style.display = 'grid';
                document.getElementById('btn-level').classList.remove('hidden');
                document.getElementById('btn-bgm').classList.remove('hidden');
                if (isBgmPlaying) bgmAudio.play();
                animalsPos.forEach(anim => anim.el = document.getElementById(anim.id));
                requestAnimationFrame(moveAnimalsLoop);
                const process = async () => {
                    if (isCameraActive) {
                        try { await hands.send({ image: videoElement }); } catch(e) {}
                        requestAnimationFrame(process);
                    }
                };
                process();
            } catch (err) { errorView.classList.remove('hidden'); }
        }

        btnStart.addEventListener('click', startCamera);
        new ResizeObserver(() => {
            const c = document.getElementById('video-container');
            if (c) { canvasElement.width = c.clientWidth; canvasElement.height = c.clientHeight; }
        }).observe(document.body);
    </script>
</body>
</html>
