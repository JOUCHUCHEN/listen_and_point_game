<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語動態闖關遊戲 - 道具互動版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe 函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; }
        .btn-action { transition: all 0.2s ease-in-out; }
        .btn-action:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-action:active { transform: translateY(0) scale(0.98); }
        
        #video-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 1rem; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); cursor: pointer; }
        
        /* 攝影機鏡像處理 */
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .input_video { display: none; }

        .success-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(34, 197, 94, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            z-index: 50;
        }
        .success-overlay.active { opacity: 1; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loader {
            border: 5px solid #f3f3f3; border-top: 5px solid #3b82f6; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-green-700 mb-2">🎈 英語動態闖關遊戲 🏃‍♂️</h1>
            <p class="text-gray-600 text-lg">老師選擇題目，學生先「碰觸或點擊道具」再「做出動作」！</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 左側：老師控制台 -->
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-lg border-2 border-green-100 flex flex-col">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-700 p-2 rounded-lg">👩‍🏫</span> 老師控制台
                    </h2>
                    <p class="text-sm text-gray-500 mt-2">請點擊下方題目，系統會發出語音並顯示道具讓學生選擇。</p>
                </div>

                <div class="grid grid-cols-1 gap-4 flex-grow">
                    <button onclick="startGame('Roll a hoop')" class="btn-action bg-gradient-to-r from-orange-400 to-orange-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span>Roll a hoop</span>
                            <span class="text-sm text-orange-100 font-normal">任務：選取圓框並轉動</span>
                        </div>
                        <span class="text-3xl group-hover:rotate-12 transition-transform">⭕</span>
                    </button>

                    <button onclick="startGame('Bounce a balloon')" class="btn-action bg-gradient-to-r from-pink-400 to-pink-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span>Bounce a balloon</span>
                            <span class="text-sm text-pink-100 font-normal">任務：選取氣球並向上拍打</span>
                        </div>
                        <span class="text-3xl group-hover:-translate-y-2 transition-transform">🎈</span>
                    </button>

                    <button onclick="startGame('Blow bubbles')" class="btn-action bg-gradient-to-r from-blue-400 to-blue-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left relative z-10">
                            <span>Blow bubbles</span>
                            <span class="text-sm text-blue-100 font-normal">任務：選取泡泡框並靠近嘴吹</span>
                        </div>
                        <span class="text-3xl group-hover:scale-110 transition-transform relative z-10">🫧</span>
                    </button>

                    <button onclick="startGame('Stack cups')" class="btn-action bg-gradient-to-r from-purple-400 to-purple-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span>Stack cups</span>
                            <span class="text-sm text-purple-100 font-normal">任務：選取杯子並雙手靠攏排列</span>
                        </div>
                        <span class="text-3xl group-hover:translate-y-1 transition-transform">🥤</span>
                    </button>
                </div>
            </div>

            <!-- 右側：學生互動區 -->
            <div class="w-full lg:w-2/3 bg-white p-6 rounded-2xl shadow-lg border-2 border-green-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-green-100 text-green-700 p-2 rounded-lg">🙋‍♂️</span> 學生挑戰區
                    </h2>
                    <div id="status-badge" class="px-4 py-1 bg-gray-200 text-gray-600 rounded-full text-sm font-bold animate-pulse">
                        系統載入中...
                    </div>
                </div>

                <!-- 遊戲狀態提示 -->
                <div id="game-prompt" class="hidden mb-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg shadow-sm">
                    <p class="text-yellow-800 font-bold text-xl" id="target-action-text">等待老師出題...</p>
                    <p class="text-yellow-600 text-md mt-1 font-bold animate-pulse" id="action-hint">請準備好</p>
                </div>

                <!-- 攝影機與進度條 -->
                <div id="video-container">
                    <div id="loading-screen" class="absolute inset-0 bg-gray-900 flex flex-col items-center justify-center text-white z-10">
                        <div class="loader mb-4"></div>
                        <p>正在啟動 AI 攝影機與姿態模型...</p>
                        <p class="text-sm text-gray-400 mt-2">首次載入可能需要幾秒鐘</p>
                    </div>

                    <video class="input_video" autoplay playsinline></video>
                    <canvas id="output_canvas" width="1280" height="720"></canvas>
                    
                    <div id="success-overlay" class="success-overlay">
                        <div class="text-6xl mb-4">🎉</div>
                        <h3 class="text-6xl font-extrabold mb-4 drop-shadow-md text-yellow-300 tracking-wider">回答正確！</h3>
                        <p class="text-3xl font-bold drop-shadow-md text-white">Excellent Job!</p>
                    </div>

                    <div id="progress-container" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-4/5 hidden">
                        <div class="flex justify-between text-white text-sm font-bold mb-1 drop-shadow-md">
                            <span>動作完成度...</span>
                            <span id="progress-text">0%</span>
                        </div>
                        <div class="w-full bg-gray-300 rounded-full h-6 border-2 border-white shadow-lg overflow-hidden relative">
                            <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-green-600 h-full rounded-full transition-all duration-100 ease-out" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 遊戲狀態與變數 ---
        let gamePhase = 'idle'; // 'idle', 'selecting', 'playing'
        let currentQuestion = null;
        let progress = 0;
        let isModelLoaded = false;
        let lastWrongTouchTime = 0; 
        
        // 互動動畫變數
        let lastLeftHand = { x: 0, y: 0 };
        let lastRightHand = { x: 0, y: 0 };
        let hoopRotation = 0;
        let balloonYOffset = -50;
        let balloonVelocity = 0;
        let bubbles = []; 

        // --- 畫面上漂浮的道具定義 ---
        const SCREEN_PROPS = [
            { id: 'Roll a hoop', x: 0.25, y: 0.3, emoji: '⭕', color: '#f97316', text: 'Hoop' },
            { id: 'Bounce a balloon', x: 0.75, y: 0.3, emoji: '🎈', color: '#ec4899', text: 'Balloon' },
            { id: 'Blow bubbles', x: 0.25, y: 0.7, emoji: '🪄', color: '#3b82f6', text: 'Bubbles' },
            { id: 'Stack cups', x: 0.75, y: 0.7, emoji: '🥤', color: '#a855f7', text: 'Cups' }
        ];

        // --- DOM 元素 ---
        const videoElement = document.getElementsByClassName('input_video')[0];
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const statusBadge = document.getElementById('status-badge');
        const gamePrompt = document.getElementById('game-prompt');
        const targetActionText = document.getElementById('target-action-text');
        const actionHint = document.getElementById('action-hint');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const successOverlay = document.getElementById('success-overlay');

        // --- 滑鼠點擊支援 ---
        canvasElement.addEventListener('click', (e) => {
            if (gamePhase === 'selecting' && currentQuestion) {
                const rect = canvasElement.getBoundingClientRect();
                const scaleX = canvasElement.width / rect.width;
                const scaleY = canvasElement.height / rect.height;
                const cx = (e.clientX - rect.left) * scaleX;
                const cy = (e.clientY - rect.top) * scaleY;

                for (let prop of SCREEN_PROPS) {
                    const px = prop.x * canvasElement.width;
                    const py = prop.y * canvasElement.height;
                    if (Math.hypot(cx - px, cy - py) < 150) { 
                        if (prop.id === currentQuestion) {
                            activateProp(currentQuestion);
                        } else {
                            speakChinese("Oops! 找錯囉，再試試！");
                        }
                        break;
                    }
                }
            }
        });

        // --- 共用的道具啟動邏輯 ---
        function activateProp(action) {
            gamePhase = 'playing';
            speakChinese("很好！現在開始動作！");
            progressContainer.classList.remove('hidden');
            
            if(action === 'Roll a hoop') actionHint.innerHTML = "✨ <strong>任務：手指握著圓框，左右水平來回轉動！</strong>";
            if(action === 'Bounce a balloon') actionHint.innerHTML = "✨ <strong>任務：手指由下往上，快速拍打氣球！</strong>";
            if(action === 'Blow bubbles') actionHint.innerHTML = "✨ <strong>任務：把泡泡框靠近嘴巴，用力吹氣！</strong>";
            if(action === 'Stack cups') actionHint.innerHTML = "✨ <strong>任務：用手指拿著杯子，在胸前靠攏排列！</strong>";
            
            balloonYOffset = -80;
            hoopRotation = 0;
        }

        // --- 語音系統 ---
        function speak(text, rate = 0.85) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US'; msg.rate = rate;
                window.speechSynthesis.speak(msg);
            }
        }
        function speakChinese(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW';
                window.speechSynthesis.speak(msg);
            }
        }

        // --- 老師點擊出題 ---
        function startGame(action) {
            if (!isModelLoaded) return alert("請等待 AI 模型載入完成！");

            currentQuestion = action;
            gamePhase = 'selecting';
            progress = 0;
            bubbles = []; 
            updateProgressBar();
            
            successOverlay.classList.remove('active');
            gamePrompt.classList.remove('hidden');
            progressContainer.classList.add('hidden');
            
            targetActionText.innerHTML = `任務：<span class="text-2xl ml-2 text-blue-600 font-black">${action}</span>`;
            actionHint.innerHTML = `👉 <strong>第一步：請用「手指黃圈」或「滑鼠」碰觸畫面的道具！</strong>`;
            
            speak(action);
        }

        function handleSuccess() {
            gamePhase = 'idle';
            progress = 100;
            updateProgressBar();
            successOverlay.classList.add('active');
            progressContainer.classList.add('hidden');
            speakChinese("回答正確！");
            setTimeout(() => { speak("Excellent!", 1.0); }, 1000);

            setTimeout(() => {
                successOverlay.classList.remove('active');
                gamePrompt.classList.add('hidden');
                currentQuestion = null;
                progress = 0;
                bubbles = [];
            }, 4000);
        }

        function updateProgressBar() {
            const clamped = Math.min(100, Math.max(0, progress));
            progressBar.style.width = `${clamped}%`;
            progressText.innerText = `${Math.floor(clamped)}%`;
        }

        // --- 視覺回饋：畫出與參考代碼完全相同的手指指標 ---
        function drawFingerPointers(ctx, landmarks, cw, ch) {
            // 在 Pose 模型中，19 是左手食指，20 是右手食指
            const tips = [19, 20]; 
            ctx.save();
            tips.forEach(i => {
                const pt = landmarks[i];
                if (pt && pt.visibility > 0.05) { 
                    const x = pt.x * cw;
                    const y = pt.y * ch;
                    ctx.beginPath();
                    // 套用參考代碼的圓圈比例設計
                    ctx.arc(x, y, cw * 0.025, 0, 2 * Math.PI);
                    ctx.fillStyle = '#fbbf24'; // 黃色
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = cw * 0.006;
                    ctx.stroke();
                }
            });
            ctx.restore();
        }

        // 畫四個角落的待選道具
        function drawSelectionProps(ctx, cw, ch) {
            SCREEN_PROPS.forEach(prop => {
                const px = prop.x * cw;
                const py = prop.y * ch;

                ctx.save();
                ctx.beginPath(); ctx.arc(px, py, 80, 0, Math.PI * 2); 
                ctx.fillStyle = prop.color; ctx.globalAlpha = 0.6; ctx.fill();
                ctx.globalAlpha = 1.0; ctx.lineWidth = 6; ctx.strokeStyle = '#ffffff'; ctx.stroke();

                ctx.font = '70px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(prop.emoji, px, py - 10);
                
                ctx.font = 'bold 26px Arial'; ctx.fillStyle = 'white'; ctx.strokeStyle = 'black'; ctx.lineWidth = 4;
                ctx.strokeText(prop.text, px, py + 45); ctx.fillText(prop.text, px, py + 45);
                ctx.restore();
            });
        }

        // 檢查手指是否碰到道具 (僅依賴食指指標)
        function checkPropCollision(landmarks, cw, ch) {
            const hitPoints = [19, 20]; // 僅判定食指 19, 20
            for (let prop of SCREEN_PROPS) {
                const px = prop.x * cw;
                const py = prop.y * ch;
                for (let idx of hitPoints) {
                    const pt = landmarks[idx];
                    if (pt && pt.visibility > 0.05) {
                        const dist = Math.hypot((pt.x * cw) - px, (pt.y * ch) - py);
                        // 道具半徑(80) + 指標寬容值，設為 120 讓觸碰流暢
                        if (dist < 120) return prop; 
                    }
                }
            }
            return null;
        }

        // 泡泡粒子
        class Bubble {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = Math.random() * 20 + 8;
                this.speedY = Math.random() * -5 - 3; this.speedX = Math.random() * 6 - 3;
                this.opacity = 1; this.wobble = Math.random() * Math.PI * 2;
            }
            update() {
                this.wobble += 0.1; this.y += this.speedY; this.x += this.speedX + Math.sin(this.wobble) * 2;
                this.opacity -= 0.015;
            }
            draw(ctx) {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.1, this.x, this.y, this.radius);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                grad.addColorStop(0.5, `rgba(173, 216, 230, ${this.opacity * 0.6})`);
                grad.addColorStop(1, `rgba(216, 191, 216, ${this.opacity * 0.8})`);
                ctx.fillStyle = grad; ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 2; ctx.fill(); ctx.stroke(); ctx.restore();
            }
        }

        // 繪製手指上的互動道具
        function drawActiveProp(ctx, action, px, py, prog) {
            ctx.save();
            if (action === 'Roll a hoop') {
                ctx.translate(px, py); ctx.rotate(hoopRotation);
                ctx.beginPath(); ctx.arc(0, 0, 90, 0, Math.PI * 2);
                ctx.lineWidth = 18; ctx.strokeStyle = '#f97316'; ctx.stroke();
                ctx.beginPath(); ctx.arc(75, 0, 12, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
                ctx.beginPath(); ctx.arc(-75, 0, 12, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();

            } else if (action === 'Bounce a balloon') {
                const by = py + balloonYOffset;
                ctx.beginPath(); ctx.moveTo(px, by + 40); ctx.lineTo(px, py);
                ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
                ctx.font = '120px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🎈', px, by);
                
            } else if (action === 'Blow bubbles') {
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + 80);
                ctx.lineWidth = 12; ctx.strokeStyle = '#facc15'; ctx.lineCap = 'round'; ctx.stroke();
                ctx.beginPath(); ctx.arc(px, py - 35, 45, 0, Math.PI * 2);
                ctx.lineWidth = 10; ctx.strokeStyle = '#ec4899'; ctx.stroke();

            } else if (action === 'Stack cups') {
                const stackFactor = prog / 100;
                ctx.font = '90px Arial'; ctx.textAlign = 'center';
                ctx.fillText('🥤', px - 90 + (45 * stackFactor), py + 40);
                ctx.fillText('🥤', px + 90 - (45 * stackFactor), py + 40);
                ctx.fillText('🥤', px, py - 50 + (30 * stackFactor));
            }
            ctx.restore();
        }

        // --- 主要 MediaPipe 處理迴圈 ---
        function onResults(results) {
            if (!isModelLoaded) {
                isModelLoaded = true; loadingScreen.style.display = 'none';
                statusBadge.innerText = '✅ 系統準備就緒';
                statusBadge.classList.replace('bg-gray-200', 'bg-green-100');
                statusBadge.classList.replace('text-gray-600', 'text-green-700');
                statusBadge.classList.remove('animate-pulse');
            }

            const cw = canvasElement.width;
            const ch = canvasElement.height;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, cw, ch);
            
            canvasCtx.translate(cw, 0); canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, cw, ch);
            canvasCtx.restore(); 

            let landmarks = null;
            if (results.poseLandmarks) {
                landmarks = results.poseLandmarks.map(p => ({ ...p, x: 1 - p.x }));
            }

            if (gamePhase === 'selecting') {
                drawSelectionProps(canvasCtx, cw, ch);
            }

            if (landmarks) {
                // 畫半透明骨架
                drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.3)', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: 'rgba(59, 130, 246, 0.4)', lineWidth: 1, radius: 2});
                
                // 畫出完全依照您代碼設計的手指指標 (綁定在 19, 20 食指)
                drawFingerPointers(canvasCtx, landmarks, cw, ch);

                // 將遊戲互動的追蹤點，從原本的手腕完全改為食指
                const lHand = landmarks[19] || {x: 0, y:0};
                const rHand = landmarks[20] || {x: 0, y:0};

                if (gamePhase === 'selecting') {
                    const touchedProp = checkPropCollision(landmarks, cw, ch);
                    if (touchedProp) {
                        if (touchedProp.id === currentQuestion) {
                            lastLeftHand = { x: lHand.x, y: lHand.y };
                            lastRightHand = { x: rHand.x, y: rHand.y };
                            activateProp(currentQuestion);
                        } else {
                            if (Date.now() - lastWrongTouchTime > 3000) {
                                speakChinese("Oops! 是另一個喔！");
                                lastWrongTouchTime = Date.now();
                            }
                        }
                    }

                } else if (gamePhase === 'playing') {
                    let isActionActive = false;
                    
                    const ldx = lHand.x - lastLeftHand.x;
                    const ldy = lHand.y - lastLeftHand.y;
                    const rdx = rHand.x - lastRightHand.x;
                    const rdy = rHand.y - lastRightHand.y;

                    // 決定道具要畫在哪一隻手指上
                    let activeHand = lHand.y < rHand.y ? lHand : rHand;
                    let px = activeHand.x * cw;
                    let py = activeHand.y * ch;

                    if (currentQuestion === 'Blow bubbles') {
                        const mouthX = (landmarks[9].x + landmarks[10].x) / 2;
                        const mouthY = (landmarks[9].y + landmarks[10].y) / 2;
                        const dL = Math.hypot(lHand.x - mouthX, lHand.y - mouthY);
                        const dR = Math.hypot(rHand.x - mouthX, rHand.y - mouthY);
                        activeHand = (dL < dR) ? lHand : rHand;
                        px = activeHand.x * cw; py = activeHand.y * ch;
                    }

                    drawActiveProp(canvasCtx, currentQuestion, px, py, progress);

                    switch (currentQuestion) {
                        case 'Roll a hoop':
                            if (Math.abs(ldx) > 0.004 || Math.abs(rdx) > 0.004) {
                                const moveX = Math.abs(ldx) > Math.abs(rdx) ? ldx : rdx;
                                hoopRotation += moveX * 18;
                                isActionActive = true;
                                progress += Math.max(Math.abs(ldx), Math.abs(rdx)) * 300; 
                            }
                            break;

                        case 'Bounce a balloon':
                            if (ldy < -0.01 || rdy < -0.01) {
                                balloonVelocity = -18; 
                                isActionActive = true;
                                progress += 8; 
                            }
                            balloonVelocity += 1.5; 
                            balloonYOffset += balloonVelocity;
                            if (balloonYOffset > -40) { balloonYOffset = -40; balloonVelocity = 0; } 
                            if (balloonYOffset < -250) balloonYOffset = -250;
                            break;

                        case 'Blow bubbles':
                            const mouthY = (landmarks[9].y + landmarks[10].y) / 2;
                            const mouthX = (landmarks[9].x + landmarks[10].x) / 2;
                            const distToMouth = Math.hypot(activeHand.x - mouthX, activeHand.y - mouthY);
                            
                            if (distToMouth < 0.28) { 
                                isActionActive = true;
                                progress += 2.5;
                                if (Math.random() > 0.3) {
                                    bubbles.push(new Bubble(activeHand.x * cw, (activeHand.y * ch) - 40));
                                }
                            }
                            break;

                        case 'Stack cups':
                            const distHands = Math.hypot(lHand.x - rHand.x, lHand.y - rHand.y);
                            if (distHands < 0.28) { 
                                isActionActive = true;
                                progress += 3.0;
                            }
                            break;
                    }

                    if (!isActionActive) progress -= 0.5;
                    progress = Math.max(0, Math.min(100, progress));
                    updateProgressBar();

                    lastLeftHand = { x: lHand.x, y: lHand.y };
                    lastRightHand = { x: rHand.x, y: rHand.y };

                    if (progress >= 100) {
                        handleSuccess();
                        if (currentQuestion === 'Blow bubbles') {
                            for(let i=0; i<40; i++) bubbles.push(new Bubble(activeHand.x * cw, activeHand.y * ch - 40));
                        }
                    }
                }
            } else {
                if (gamePhase === 'playing') drawActiveProp(canvasCtx, currentQuestion, cw/2, ch/2, progress);
                if (gamePhase === 'playing' && progress > 0) {
                    progress -= 1; updateProgressBar();
                }
            }

            bubbles.forEach(b => b.update());
            bubbles = bubbles.filter(b => b.opacity > 0);
            bubbles.forEach(b => b.draw(canvasCtx));
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true,
            minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 
        });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });
        
        camera.start().catch(err => {
            console.error(err);
            alert("無法存取攝影機，請確認已給予瀏覽器攝影機權限！");
            statusBadge.innerText = '❌ 攝影機存取失敗';
            statusBadge.classList.replace('bg-gray-200', 'bg-red-100');
            statusBadge.classList.replace('text-gray-600', 'text-red-700');
        });

    </script>
</body>
</html>
