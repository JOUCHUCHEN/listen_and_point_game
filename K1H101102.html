<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語動態闖關遊戲 - 特效升級版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe 函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; }
        .btn-action { transition: all 0.2s ease-in-out; }
        .btn-action:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-action:active { transform: translateY(0) scale(0.98); }
        
        #video-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 1rem; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* 鏡像顯示 */ }
        
        /* 隱藏原始影片，只顯示 Canvas */
        .input_video { display: none; }

        .success-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(34, 197, 94, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            z-index: 50;
        }
        .success-overlay.active { opacity: 1; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loader {
            border: 5px solid #f3f3f3; border-top: 5px solid #3b82f6; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-green-700 mb-2">🎈 英語動態闖關遊戲 🏃‍♂️</h1>
            <p class="text-gray-600 text-lg">老師選擇動作，學生做出對應姿勢即可過關！</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 左側：老師控制台 -->
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-lg border-2 border-green-100 flex flex-col">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-700 p-2 rounded-lg">👩‍🏫</span> 老師控制台
                    </h2>
                    <p class="text-sm text-gray-500 mt-2">請點擊下方按鈕出題，系統會自動發音並開始偵測。</p>
                </div>

                <div class="grid grid-cols-1 gap-4 flex-grow">
                    <button onclick="startGame('Roll a hoop')" class="btn-action bg-gradient-to-r from-orange-400 to-orange-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span>Roll a hoop</span>
                            <span class="text-sm text-orange-100 font-normal">滾鐵環 (單手側伸)</span>
                        </div>
                        <span class="text-3xl group-hover:rotate-12 transition-transform">⭕</span>
                    </button>

                    <button onclick="startGame('Bounce a balloon')" class="btn-action bg-gradient-to-r from-pink-400 to-pink-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span>Bounce a balloon</span>
                            <span class="text-sm text-pink-100 font-normal">拍氣球 (手舉高過肩)</span>
                        </div>
                        <span class="text-3xl group-hover:-translate-y-2 transition-transform">🎈</span>
                    </button>

                    <button onclick="startGame('Blow bubbles')" class="btn-action bg-gradient-to-r from-blue-400 to-blue-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group border-4 border-yellow-300 relative overflow-hidden">
                        <div class="absolute inset-0 bg-white opacity-20 animate-pulse"></div>
                        <div class="flex flex-col text-left relative z-10">
                            <span>Blow bubbles</span>
                            <span class="text-sm text-blue-100 font-normal">吹泡泡 (有視覺特效✨)</span>
                        </div>
                        <span class="text-3xl group-hover:scale-110 transition-transform relative z-10">🫧</span>
                    </button>

                    <button onclick="startGame('Stack cups')" class="btn-action bg-gradient-to-r from-purple-400 to-purple-500 text-white p-4 rounded-xl font-bold text-xl flex items-center justify-between group">
                        <div class="flex flex-col text-left">
                            <span>Stack cups</span>
                            <span class="text-sm text-purple-100 font-normal">疊杯子 (雙手胸前靠攏)</span>
                        </div>
                        <span class="text-3xl group-hover:translate-y-1 transition-transform">🥤</span>
                    </button>
                </div>
            </div>

            <!-- 右側：學生互動區 -->
            <div class="w-full lg:w-2/3 bg-white p-6 rounded-2xl shadow-lg border-2 border-green-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-green-100 text-green-700 p-2 rounded-lg">🙋‍♂️</span> 學生挑戰區
                    </h2>
                    <div id="status-badge" class="px-4 py-1 bg-gray-200 text-gray-600 rounded-full text-sm font-bold animate-pulse">
                        系統載入中...
                    </div>
                </div>

                <!-- 遊戲狀態提示 -->
                <div id="game-prompt" class="hidden mb-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg shadow-sm">
                    <p class="text-yellow-800 font-bold text-lg" id="target-action-text">等待老師出題...</p>
                    <p class="text-yellow-600 text-sm mt-1" id="action-hint">請準備好</p>
                </div>

                <!-- 攝影機與進度條 -->
                <div id="video-container">
                    <!-- 載入中畫面 -->
                    <div id="loading-screen" class="absolute inset-0 bg-gray-900 flex flex-col items-center justify-center text-white z-10">
                        <div class="loader mb-4"></div>
                        <p>正在啟動 AI 攝影機與姿態模型...</p>
                        <p class="text-sm text-gray-400 mt-2">首次載入可能需要幾秒鐘</p>
                    </div>

                    <video class="input_video" autoplay playsinline></video>
                    <canvas id="output_canvas" width="1280" height="720"></canvas>
                    
                    <!-- 過關動畫覆蓋層 -->
                    <div id="success-overlay" class="success-overlay">
                        <div class="text-6xl mb-4">🎉</div>
                        <h3 class="text-6xl font-extrabold mb-4 drop-shadow-md text-yellow-300 tracking-wider">回答正確！</h3>
                        <p class="text-3xl font-bold drop-shadow-md text-white">Excellent Job!</p>
                    </div>

                    <!-- 進度條 -->
                    <div id="progress-container" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-4/5 hidden">
                        <div class="flex justify-between text-white text-sm font-bold mb-1 drop-shadow-md">
                            <span>偵測進度...</span>
                            <span id="progress-text">0%</span>
                        </div>
                        <div class="w-full bg-gray-300 rounded-full h-5 border-2 border-white shadow-lg overflow-hidden relative">
                            <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-green-600 h-full rounded-full transition-all duration-100 ease-out" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- 狀態變數 ---
        let currentAction = null;
        let isPlaying = false;
        let progress = 0;
        let isModelLoaded = false;
        
        // --- 特效變數 ---
        let bubbles = []; // 存放泡泡粒子的陣列
        
        // --- DOM 元素 ---
        const videoElement = document.getElementsByClassName('input_video')[0];
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const statusBadge = document.getElementById('status-badge');
        const gamePrompt = document.getElementById('game-prompt');
        const targetActionText = document.getElementById('target-action-text');
        const actionHint = document.getElementById('action-hint');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const successOverlay = document.getElementById('success-overlay');

        // --- 語音合成 ---
        function speak(text, rate = 0.85) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = rate;
                window.speechSynthesis.speak(msg);
            }
        }

        function speakChinese(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW';
                window.speechSynthesis.speak(msg);
            }
        }

        // --- 老師點擊出題 ---
        function startGame(action) {
            if (!isModelLoaded) {
                alert("請等待 AI 模型載入完成！");
                return;
            }

            currentAction = action;
            isPlaying = true;
            progress = 0;
            bubbles = []; // 清空舊泡泡
            updateProgressBar();
            
            successOverlay.classList.remove('active');
            gamePrompt.classList.remove('hidden');
            progressContainer.classList.remove('hidden');
            targetActionText.innerHTML = `任務：<span class="text-2xl ml-2 text-blue-600 font-black">${action}</span>`;
            
            switch(action) {
                case 'Roll a hoop':
                    actionHint.innerText = "提示：單手向側邊伸直 (手臂打直)";
                    break;
                case 'Bounce a balloon':
                    actionHint.innerText = "提示：單手或雙手舉高過肩膀 (模擬拍氣球)";
                    break;
                case 'Blow bubbles':
                    actionHint.innerHTML = "✨ <strong>特別任務：</strong>請對著畫面出現的「泡泡環」做出吹氣動作！";
                    break;
                case 'Stack cups':
                    actionHint.innerText = "提示：雙手在胸前靠攏 (手腕距離拉近)";
                    break;
            }

            speak(action);
        }

        // --- 過關處理 ---
        function handleSuccess() {
            isPlaying = false;
            progress = 100;
            updateProgressBar();
            
            successOverlay.classList.add('active');
            progressContainer.classList.add('hidden');
            
            speakChinese("回答正確！");
            setTimeout(() => { speak("Excellent!", 1.0); }, 1000);

            // 4秒後重置
            setTimeout(() => {
                successOverlay.classList.remove('active');
                gamePrompt.classList.add('hidden');
                currentAction = null;
                progress = 0;
                bubbles = [];
            }, 4000);
        }

        function updateProgressBar() {
            const clamped = Math.min(100, Math.max(0, progress));
            progressBar.style.width = `${clamped}%`;
            progressText.innerText = `${Math.floor(clamped)}%`;
        }

        // --- 泡泡特效系統 (Particle System) ---
        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 20 + 8; // 大小隨機
                this.speedY = Math.random() * -5 - 3; // 向上浮動
                this.speedX = Math.random() * 6 - 3;  // 左右飄移
                this.opacity = 1;
                this.wobble = Math.random() * Math.PI * 2; // 搖擺初始值
            }
            update() {
                this.wobble += 0.1;
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 2; // 增加左右搖擺感
                this.opacity -= 0.015; // 逐漸消失
            }
            draw(ctx) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                // 泡泡本體顏色 (帶點彩虹光澤的藍紫色)
                const gradient = ctx.createRadialGradient(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.1, this.x, this.y, this.radius);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                gradient.addColorStop(0.5, `rgba(173, 216, 230, ${this.opacity * 0.6})`);
                gradient.addColorStop(1, `rgba(216, 191, 216, ${this.opacity * 0.8})`);
                
                ctx.fillStyle = gradient;
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
                
                // 亮點反光
                ctx.beginPath();
                ctx.arc(this.x - this.radius*0.4, this.y - this.radius*0.4, this.radius*0.2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.9})`;
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 繪製吹泡泡環 ---
        function drawBubbleWand(ctx, x, y) {
            ctx.save();
            // 繪製握把
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + 100);
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#facc15'; // 黃色握把
            ctx.lineCap = 'round';
            ctx.stroke();

            // 繪製圓環
            ctx.beginPath();
            ctx.arc(x, y - 35, 40, 0, Math.PI * 2);
            ctx.lineWidth = 10;
            ctx.strokeStyle = '#ec4899'; // 粉紅色環
            ctx.stroke();
            
            // 環的內圈
            ctx.beginPath();
            ctx.arc(x, y - 35, 40, 0, Math.PI * 2);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#fbcfe8';
            ctx.stroke();
            ctx.restore();
        }

        // 取得離嘴巴最近的手 (用來拿泡泡環)
        function getActiveHand(landmarks) {
            const mouthX = (landmarks[9].x + landmarks[10].x) / 2;
            const mouthY = (landmarks[9].y + landmarks[10].y) / 2;
            const distL = Math.hypot(landmarks[15].x - mouthX, landmarks[15].y - mouthY);
            const distR = Math.hypot(landmarks[16].x - mouthX, landmarks[16].y - mouthY);
            return distL < distR ? landmarks[15] : landmarks[16];
        }

        // --- 動作啟發式判斷 (Heuristics) ---
        function checkActionHeuristics(landmarks) {
            if (!currentAction) return false;

            const lWrist = landmarks[15];
            const rWrist = landmarks[16];
            const lShoulder = landmarks[11];
            const rShoulder = landmarks[12];
            const mouth = { x: (landmarks[9].x + landmarks[10].x)/2, y: (landmarks[9].y + landmarks[10].y)/2 };

            let isCorrect = false;

            switch(currentAction) {
                case 'Bounce a balloon':
                    isCorrect = (lWrist.y < lShoulder.y - 0.05) || (rWrist.y < rShoulder.y - 0.05);
                    break;
                
                case 'Blow bubbles':
                    // 當手腕（泡泡環）靠近嘴巴時視為正在吹氣
                    const activeHand = getActiveHand(landmarks);
                    const distToMouth = Math.hypot(activeHand.x - mouth.x, activeHand.y - mouth.y);
                    isCorrect = distToMouth < 0.20; // 距離夠近即可
                    break;

                case 'Stack cups':
                    const distWrists = Math.hypot(lWrist.x - rWrist.x, lWrist.y - rWrist.y);
                    const isBelowShoulder = (lWrist.y > lShoulder.y) && (rWrist.y > rShoulder.y);
                    isCorrect = (distWrists < 0.18) && isBelowShoulder;
                    break;

                case 'Roll a hoop':
                    const extR = Math.abs(rWrist.x - rShoulder.x);
                    const extL = Math.abs(lWrist.x - lShoulder.x);
                    isCorrect = (extR > 0.25 && rWrist.y > rShoulder.y) || (extL > 0.25 && lWrist.y > lShoulder.y);
                    break;
            }
            return isCorrect;
        }

        // --- MediaPipe 處理回呼函數 ---
        function onResults(results) {
            if (!isModelLoaded) {
                isModelLoaded = true;
                loadingScreen.style.display = 'none';
                statusBadge.innerText = '✅ 系統準備就緒';
                statusBadge.classList.replace('bg-gray-200', 'bg-green-100');
                statusBadge.classList.replace('text-gray-600', 'text-green-700');
                statusBadge.classList.remove('animate-pulse');
            }

            const cw = canvasElement.width;
            const ch = canvasElement.height;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, cw, ch);
            
            // 繪製原始攝影機畫面
            canvasCtx.drawImage(results.image, 0, 0, cw, ch);

            // 如果有偵測到骨架
            if (results.poseLandmarks) {
                // 繪製骨架基礎線條
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.4)', lineWidth: 3});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: 'rgba(59, 130, 246, 0.6)', lineWidth: 1, radius: 3});

                let isDoingAction = false;
                if (isPlaying) {
                    isDoingAction = checkActionHeuristics(results.poseLandmarks);
                }

                // 🌟 特別處理「吹泡泡」的視覺特效 🌟
                if (currentAction === 'Blow bubbles' || (currentAction === null && bubbles.length > 0)) {
                    // 如果正在遊戲中，畫出泡泡環
                    if (currentAction === 'Blow bubbles') {
                        const activeHand = getActiveHand(results.poseLandmarks);
                        // 將 MediaPipe 歸一化座標轉換為 Canvas 實際座標
                        const px = activeHand.x * cw;
                        const py = activeHand.y * ch;

                        drawBubbleWand(canvasCtx, px, py);

                        // 如果正在做動作 (吹氣)，就產生泡泡
                        if (isDoingAction && isPlaying) {
                            // 每幀隨機產生 1~2 個泡泡，從環的中心 (py - 35) 噴出
                            if (Math.random() > 0.3) {
                                bubbles.push(new Bubble(px, py - 35));
                            }
                        }
                    }
                }

                // 進行遊戲進度判定
                if (isPlaying) {
                    if (isDoingAction) {
                        progress += 2.0; // 增加進度速度
                    } else {
                        progress -= 1.5; // 沒做動作時掉進度
                    }
                    
                    progress = Math.max(0, Math.min(100, progress));
                    updateProgressBar();

                    if (progress >= 100) {
                        handleSuccess();
                        // 過關瞬間大爆發泡泡！
                        if (currentAction === 'Blow bubbles') {
                            const activeHand = getActiveHand(results.poseLandmarks);
                            for(let i=0; i<30; i++){
                                bubbles.push(new Bubble(activeHand.x * cw, activeHand.y * ch - 35));
                            }
                        }
                    }
                }
            } else {
                if (isPlaying && progress > 0) {
                    progress -= 2;
                    updateProgressBar();
                }
            }

            // 更新並繪製所有泡泡 (獨立於人體偵測，確保泡泡平滑移動)
            bubbles.forEach(b => b.update());
            // 過濾掉透明度小於0的死掉泡泡
            bubbles = bubbles.filter(b => b.opacity > 0);
            bubbles.forEach(b => b.draw(canvasCtx));

            canvasCtx.restore();
        }

        // --- 初始化 MediaPipe Pose ---
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});
        
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        // --- 初始化攝影機 ---
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        camera.start().catch(err => {
            console.error(err);
            alert("無法存取攝影機，請確認已給予瀏覽器攝影機權限！");
            statusBadge.innerText = '❌ 攝影機存取失敗';
            statusBadge.classList.replace('bg-gray-200', 'bg-red-100');
            statusBadge.classList.replace('text-gray-600', 'text-red-700');
        });

    </script>
</body>
</html>
