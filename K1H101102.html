<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K1 Listen and Point - Actions</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap');

        /* 外層背景 */
        body {
            background-color: #cbd5e1;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            color: #4a3728;
        }

        .mirror {
            transform: scaleX(-1);
        }

        /* 16:9 遊戲容器 */
        .app-wrapper {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: #f8fafc;
            position: relative;
            overflow: hidden;
            container-type: size;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3.5cqh;
        }

        /* 目標框基礎樣式 */
        .target-box {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s, border-color 0.3s, background-color 0.3s;
            border: 0.6cqw solid #bae6fd; 
            position: absolute;
            z-index: 20;
            width: 20%; 
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 0.5cqw 1.5cqw rgba(0,0,0,0.05);
        }

        /* 通用答對動畫：發光效果 */
        .target-box.success {
            border-color: #4ade80 !important;
            background-color: white;
            transform: scale(1.25) rotate(15deg);
            z-index: 30;
            animation: bounce 0.5s ease infinite alternate;
            filter: drop-shadow(0 0 3cqw #4ade80);
        }
        
        @keyframes bounce {
            from { transform: scale(1.15) rotate(12deg); }
            to { transform: scale(1.3) rotate(-12deg); }
        }

        /* 通用答錯動畫：發光效果 */
        .target-box.wrong {
            border-color: #f87171 !important;
            background-color: white;
            animation: shake 0.4s ease-in-out;
            z-index: 30;
            filter: drop-shadow(0 0 3cqw #f87171);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .item-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5%;
            transition: transform 0.1s linear; 
            border-radius: 50%;
        }

        .cloud {
            position: absolute;
            z-index: 0;
            animation: float 25s linear infinite;
        }
        @keyframes float {
            from { transform: translateX(-20cqw); }
            to { transform: translateX(120cqw); }
        }

        .candy-btn {
            border-bottom: 0.5cqh solid rgba(0,0,0,0.15);
            transition: all 0.1s;
            color: white;
            font-weight: 900;
        }
        .candy-btn:active {
            border-bottom-width: 0px;
            transform: translateY(0.5cqh) scale(0.95);
        }

        #landscape-hint {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #bae6fd;
            color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 9999;
        }
        @media screen and (orientation: portrait) {
            #landscape-hint { display: flex; align-items: center; gap: 8px; }
        }

        .title-sticker {
            color: #4a3728;
            -webkit-text-stroke: 0.25cqw #4a3728;
            text-shadow: 
                0.4cqw 0 0 #ffffff, -0.4cqw 0 0 #ffffff, 
                0 0.4cqw 0 #ffffff, 0 -0.4cqw 0 #ffffff,
                0.3cqw 0.3cqw 0 #ffffff, -0.3cqw -0.3cqw 0 #ffffff, 
                0.3cqw -0.3cqw 0 #ffffff, -0.3cqw 0.3cqw 0 #ffffff;
        }

        /* 首頁物件跳動動畫 */
        @keyframes item-jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4cqh); }
        }
        .jumping-item {
            display: block;
            animation: item-jump 1s infinite ease-in-out;
            width: 18cqh;
            height: 18cqh;
            object-fit: contain;
            border-radius: 50%;
        }
        .jumping-item:nth-child(1) { animation-delay: 0s; }
        .jumping-item:nth-child(2) { animation-delay: 0.15s; }
        .jumping-item:nth-child(3) { animation-delay: 0.3s; }
        .jumping-item:nth-child(4) { animation-delay: 0.45s; }
    </style>
</head>
<body>

    <div id="landscape-hint">
        <span>💫 Switch to Landscape for a better view!</span>
    </div>

    <div class="app-wrapper">
        
        <!-- 音樂按鈕 -->
        <button id="btn-bgm" onclick="toggleBGM()" class="hidden flex absolute z-50 candy-btn bg-[#34d399] hover:bg-[#10b981] text-white rounded-full shadow-lg items-center justify-center" style="top: 2cqh; left: 2cqw; width: 6cqh; height: 6cqh; font-size: 3cqh;">
            🎵
        </button>

        <svg class="cloud" style="top: 10cqh; opacity: 0.6; width: 15cqw;" viewBox="0 0 100 60"><path fill="#e0f2fe" d="M20,40 Q0,40 0,25 Q0,10 20,10 Q25,0 45,0 Q65,0 70,15 Q95,15 95,35 Q95,55 70,55 L20,55 Z"/></svg>
        <svg class="cloud" style="top: 60cqh; animation-delay: -12s; opacity: 0.8; width: 25cqw;" viewBox="0 0 100 60"><path fill="#e0f2fe" d="M20,40 Q0,40 0,25 Q0,10 20,10 Q25,0 45,0 Q65,0 70,15 Q95,15 95,35 Q95,55 70,55 L20,55 Z"/></svg>
        
        <h1 id="main-title" class="font-black tracking-wide z-10 flex-shrink-0 title-sticker" style="font-size: 13cqh; margin: 0; line-height: 1; transform: translateY(-1cqh);">Listen and Point</h1>

        <div id="video-container" class="relative w-[70cqw] aspect-video bg-[#334155] overflow-hidden flex-shrink-0 z-10" style="border-radius: 3cqw; border: 0.8cqw solid #bae6fd; box-shadow: 0 1.5cqw 3cqw rgba(0,0,0,0.05);">
            <video id="input_video" class="mirror" style="display:none" playsinline muted autoplay></video>
            <canvas id="output_canvas"></canvas>
            
            <div id="game-ui" class="hidden absolute inset-0 pointer-events-none">
                <!-- 第一關初始圖片 (使用 placehold.co 產生佔位符號，您可以替換這些連結) -->
                <div id="target-0" class="target-box" style="top: 4cqh; left: 4cqh;"><img src="https://placehold.co/400x400/fb7185/ffffff?text=Roll+a%0AHoop" class="item-img"></div>
                <div id="target-1" class="target-box" style="top: 4cqh; right: 4cqh;"><img src="https://placehold.co/400x400/34d399/ffffff?text=Stack%0ACups" class="item-img"></div>
                <div id="target-2" class="target-box" style="bottom: 4cqh; left: 4cqh;"><img src="https://placehold.co/400x400/fbbf24/ffffff?text=Blow%0ABubbles" class="item-img"></div>
                <div id="target-3" class="target-box" style="bottom: 4cqh; right: 4cqh;"><img src="https://placehold.co/400x400/818cf8/ffffff?text=Bounce+a%0ABalloon" class="item-img"></div>
            </div>

            <div id="init-panel" class="absolute inset-0 bg-[#f8fafc] flex flex-col items-center justify-center z-40">
                <div class="mt-[4cqh] mb-[2cqh] flex gap-[2cqw]">
                    <!-- 首頁佔位圖片 -->
                    <img src="https://placehold.co/400x400/fb7185/ffffff?text=Roll+a%0AHoop" class="jumping-item">
                    <img src="https://placehold.co/400x400/34d399/ffffff?text=Stack%0ACups" class="jumping-item">
                    <img src="https://placehold.co/400x400/fbbf24/ffffff?text=Blow%0ABubbles" class="jumping-item">
                    <img src="https://placehold.co/400x400/818cf8/ffffff?text=Bounce+a%0ABalloon" class="jumping-item">
                </div>
                <h2 class="font-black mb-[4cqh] tracking-wide" style="color: #0369a1; font-size: 11cqh; -webkit-text-stroke: 0.15cqw #0369a1;">Ready?</h2>
                <button id="btn-start-camera" class="bg-[#f09f3b] hover:bg-[#df8a28] text-white font-black rounded-full transition transform active:scale-95" style="font-size: 5.5cqh; padding: 2.5cqh 12cqw; box-shadow: 0 1cqh 3cqh rgba(240, 159, 59, 0.4);">GO !</button>
            </div>
            
            <div id="error-view" class="hidden absolute inset-0 bg-[#f8fafc] flex flex-col items-center justify-center z-40 px-[4cqw] text-center">
                <div class="text-red-400 mb-[2cqh]" style="font-size: 8cqh;">😿</div>
                <h2 class="font-bold text-gray-800 mb-[1cqh]" style="font-size: 4cqh;">Camera Problem...</h2>
                <p id="error-desc" class="text-gray-500 mb-[3cqh]" style="font-size: 2.5cqh;"></p>
                <button onclick="location.reload()" class="bg-[#bae6fd] text-[#1e3a8a] rounded-full font-bold shadow-sm" style="font-size: 3cqh; padding: 2cqh 5cqw;">Try Again</button>
            </div>
        </div>

        <div id="button-container" class="w-[70cqw] grid-cols-4 gap-[2cqw] flex-shrink-0 z-10" style="display: none;">
            <button onclick="playRound(0)" class="candy-btn bg-[#fb7185] hover:bg-[#f43f5e] rounded-[1.5cqw] flex flex-col items-center justify-center" style="font-size: 2.2cqh; padding: 1cqh 0.5cqw; line-height: 1.2;">
                <span>roll a</span><span>hoop</span>
            </button>
            <button onclick="playRound(1)" class="candy-btn bg-[#34d399] hover:bg-[#10b981] rounded-[1.5cqw] flex flex-col items-center justify-center" style="font-size: 2.2cqh; padding: 1cqh 0.5cqw; line-height: 1.2;">
                <span>stack</span><span>cups</span>
            </button>
            <button onclick="playRound(2)" class="candy-btn bg-[#fbbf24] hover:bg-[#f59e0b] rounded-[1.5cqw] flex flex-col items-center justify-center" style="font-size: 2.2cqh; padding: 1cqh 0.5cqw; line-height: 1.2;">
                <span>blow</span><span>bubbles</span>
            </button>
            <button onclick="playRound(3)" class="candy-btn bg-[#818cf8] hover:bg-[#6366f1] rounded-[1.5cqw] flex flex-col items-center justify-center" style="font-size: 2.2cqh; padding: 1cqh 0.5cqw; line-height: 1.2;">
                <span>bounce a</span><span>balloon</span>
            </button>
        </div>

        <div id="status-msg" class="absolute font-bold text-center pointer-events-none z-20 w-full" style="color: #4a3728; font-size: 3.5cqh; top: 12cqh;"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const initPanel = document.getElementById('init-panel');
        const errorView = document.getElementById('error-view');
        const btnStart = document.getElementById('btn-start-camera');
        const gameUI = document.getElementById('game-ui');

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        const audioBufferCache = {}; 

        // 背景音樂
        const bgmAudio = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/bgm.mp3');
        bgmAudio.loop = true;

        const BGM_VOL = 0.2;    
        const WORD_BOOST = 2.5;     
        const FEEDBACK_BOOST = 2.0; 

        // 反饋音效
        const feedbackSounds = {
            correctFX: 'https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/correct.mp3',
            errorFX: 'https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/error.mp3',
            tryAgain: 'https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/try%20again.mp3',
            great: 'https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/great.mp3',
            goodJob: 'https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/good%20job.mp3',
            wayToGo: 'https://raw.githubusercontent.com/JOUCHUCHEN/K1_H91-92_listen_and_point/main/way%20to%20go.mp3'
        };
        
        // 動作音檔：請替換成您自己的 MP3 連結
        const actionItems = [
            { id: 0, src: 'YOUR_AUDIO_URL_FOR_ROLL_A_HOOP.mp3' },
            { id: 1, src: 'YOUR_AUDIO_URL_FOR_STACK_CUPS.mp3' },
            { id: 2, src: 'YOUR_AUDIO_URL_FOR_BLOW_BUBBLES.mp3' },
            { id: 3, src: 'YOUR_AUDIO_URL_FOR_BOUNCE_A_BALLOON.mp3' }
        ];

        function applyInitialVolumes() {
            bgmAudio.volume = BGM_VOL;
        }
        applyInitialVolumes();

        let currentTargetId = -1;
        let isSuccess = false;
        let canScore = false;
        let isCameraActive = false;
        let errorCooldown = false; 
        let isBgmPlaying = true;

        let successTimeoutId = null;
        let errorTimeoutId = null;
        let successVoiceTimeoutId = null;
        let errorVoiceTimeoutId = null;

        // 預載音訊
        async function preLoadAssets() {
            // 預載音訊 (跳過尚未替換的 dummy 連結避免報錯)
            if (!audioCtx) audioCtx = new AudioCtx();
            const allSources = [...actionItems.map(a => a.src), ...Object.values(feedbackSounds)].filter(src => !src.includes('YOUR_AUDIO_URL'));
            const audioPromises = allSources.map(async (src) => {
                if (audioBufferCache[src]) return;
                try {
                    const response = await fetch(src);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    audioBufferCache[src] = audioBuffer;
                } catch (e) {}
            });

            await Promise.all(audioPromises);
        }

        function playBoostedAudio(url, boostLevel) {
            // 防呆處理，若使用者尚未替換音檔連結則跳過不報錯
            if (url.includes('YOUR_AUDIO_URL')) {
                console.log(`Missing Audio: ${url}`);
                return; 
            }

            if (!audioCtx) audioCtx = new AudioCtx();
            const buffer = audioBufferCache[url];
            if (buffer) {
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = boostLevel;
                gainNode.connect(audioCtx.destination);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(gainNode);
                source.start(0);
            } else {
                const fallback = new Audio(url);
                fallback.volume = Math.min(boostLevel, 1.0);
                fallback.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        function toggleBGM() {
            const btn = document.getElementById('btn-bgm');
            if (isBgmPlaying) {
                bgmAudio.pause();
                isBgmPlaying = false;
                btn.innerHTML = '🔇';
                btn.classList.replace('bg-[#34d399]', 'bg-[#9ca3af]');
            } else {
                bgmAudio.play().catch(() => {});
                isBgmPlaying = true;
                btn.innerHTML = '🎵';
                btn.classList.replace('bg-[#9ca3af]', 'bg-[#34d399]');
            }
        }

        function unlockAudio() {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const silent = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
                silent.play();
            } catch (e) {}
        }

        function playRound(btnIndex) {
            if (!isCameraActive) return;

            // ===== 強制清除舊計時器 =====
            if (successTimeoutId) clearTimeout(successTimeoutId);
            if (errorTimeoutId) clearTimeout(errorTimeoutId);
            if (successVoiceTimeoutId) clearTimeout(successVoiceTimeoutId);
            if (errorVoiceTimeoutId) clearTimeout(errorVoiceTimeoutId);

            resetBoxes();
            currentTargetId = btnIndex;
            
            canScore = true;
            isSuccess = false;
            errorCooldown = false; 

            playBoostedAudio(actionItems[currentTargetId].src, WORD_BOOST);
        }

        function resetBoxes() {
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`target-${i}`);
                if (el) el.classList.remove('success', 'wrong');
            }
        }

        function onResults(results) {
            if (!isCameraActive) return;
            const container = document.getElementById('video-container');
            const cw = container.clientWidth, ch = container.clientHeight;
            canvasElement.width = cw; canvasElement.height = ch;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, cw, ch);
            canvasCtx.translate(cw, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, cw, ch);
            canvasCtx.restore();
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    const tip = landmarks[8];
                    const x = (1 - tip.x) * cw, y = tip.y * ch;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, cw * 0.025, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = isSuccess ? '#4ade80' : '#fbbf24';
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = 'white';
                    canvasCtx.lineWidth = cw * 0.006;
                    canvasCtx.stroke();
                    if (canScore && currentTargetId !== -1) checkCollision(x, y);
                }
            }
        }

        function checkCollision(x, y) {
            const container = document.getElementById('video-container');
            const rect = container.getBoundingClientRect();
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`target-${i}`);
                if (!el) continue;
                const r = el.getBoundingClientRect();
                const cx = (r.left - rect.left) + r.width / 2;
                const cy = (r.top - rect.top) + r.height / 2;
                const dist = Math.sqrt(Math.pow(x - cx, 2) + Math.pow(y - cy, 2));
                if (dist <= r.width * 0.4) {
                    if (i === currentTargetId && !isSuccess) triggerSuccess();
                    else if (i !== currentTargetId && !isSuccess && !errorCooldown) triggerError(i);
                    return;
                }
            }
        }

        function triggerSuccess() {
            isSuccess = true; canScore = false;
            document.getElementById(`target-${currentTargetId}`).classList.add('success');
            playBoostedAudio(feedbackSounds.correctFX, FEEDBACK_BOOST);
            
            successVoiceTimeoutId = setTimeout(() => {
                const successVoices = [feedbackSounds.great, feedbackSounds.goodJob, feedbackSounds.wayToGo];
                const voice = successVoices[Math.floor(Math.random() * successVoices.length)];
                playBoostedAudio(voice, FEEDBACK_BOOST);
            }, 100);
            
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 } });
            
            successTimeoutId = setTimeout(() => { 
                if (isSuccess) { 
                    resetBoxes(); 
                    currentTargetId = -1; 
                    isSuccess = false; 
                } 
            }, 2000);
        }

        function triggerError(hitId) {
            errorCooldown = true;
            document.getElementById(`target-${hitId}`).classList.add('wrong');
            playBoostedAudio(feedbackSounds.errorFX, FEEDBACK_BOOST);
            
            errorVoiceTimeoutId = setTimeout(() => { 
                playBoostedAudio(feedbackSounds.tryAgain, FEEDBACK_BOOST); 
            }, 100);
            
            errorTimeoutId = setTimeout(() => { 
                const el = document.getElementById(`target-${hitId}`);
                if (el) el.classList.remove('wrong'); 
                errorCooldown = false; 
            }, 500);
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        async function startCamera() {
            btnStart.disabled = true; unlockAudio();
            await preLoadAssets();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 720 } });
                videoElement.srcObject = stream;
                await videoElement.play();
                isCameraActive = true;
                initPanel.style.display = 'none';
                gameUI.classList.remove('hidden');
                document.getElementById('main-title').style.display = 'none';
                document.getElementById('button-container').style.display = 'grid';
                document.getElementById('btn-bgm').classList.remove('hidden');
                if (isBgmPlaying) bgmAudio.play();
                
                const process = async () => {
                    if (isCameraActive) {
                        try { await hands.send({ image: videoElement }); } catch(e) {}
                        requestAnimationFrame(process);
                    }
                };
                process();
            } catch (err) { errorView.classList.remove('hidden'); }
        }

        btnStart.addEventListener('click', startCamera);
        new ResizeObserver(() => {
            const c = document.getElementById('video-container');
            if (c) { canvasElement.width = c.clientWidth; canvasElement.height = c.clientHeight; }
        }).observe(document.body);
    </script>
</body>
</html>
